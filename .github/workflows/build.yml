name: Build SeeMeter APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Extract project
      run: unzip SeeMeter.zip

    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install Gradle
      run: |
        wget -q https://services.gradle.org/distributions/gradle-8.6-bin.zip
        unzip -q gradle-8.6-bin.zip
        echo "$GITHUB_WORKSPACE/gradle-8.6/bin" >> $GITHUB_PATH

    - name: Build APK
      working-directory: SeeMeter
      run: |
        echo "sdk.dir=$ANDROID_HOME" > local.properties
        echo "org.gradle.daemon=false" > gradle.properties
        echo "org.gradle.jvmargs=-Xmx2g" >> gradle.properties
        echo "android.useAndroidX=true" >> gradle.properties
        echo "android.enableJetifier=true" >> gradle.properties
        gradle assembleDebug

    - uses: actions/upload-artifact@v4
      with:
        name: SeeMeter-debug
        path: SeeMeter/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
